databases:
  - name: yolohome-db
    databaseName: dadn_yolohome
    user: admin
    plan: free

services:
  - type: web
    name: yolohome-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yolohome-db
          property: connectionString
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ADAFRUIT_IO_USERNAME
        sync: false # User will set this in Render UI
      - key: ADAFRUIT_IO_KEY
        sync: false # User will set this in Render UI

  - type: web
    name: yolohome-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          name: yolohome-backend
          type: web
          property: url
